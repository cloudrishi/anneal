quarkus:
  application:
    name: anneal


  # Datasource — PostgreSQL with pgvector
  datasource:
    db-kind: postgresql
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    jdbc:
      url: ${DB_URL:jdbc:postgresql://localhost:5432/anneal}

  langchain4j:
    pgvector:
      dimension: 384
      table: finding_embeddings
      drop-table-first: false

    ollama:
      base-url: http://localhost:11434
      chat-model:
        model-name: codellama:13b
      devservices:
        enabled: false

  # Hibernate
  hibernate-orm:
    database:
      generation: none
    log:
      sql: false

  # Flyway — schema migrations
  flyway:
    migrate-at-start: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  # HTTP
  http:
    port: ${PORT:8080}
    cors:
      enabled: true
      origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
      methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      headers: Content-Type,Authorization,Accept

  # Health — Kubernetes liveness/readiness
  smallrye-health:
    root-path: /health

  # OpenAPI
  smallrye-openapi:
    info-title: anneal API
    info-version: 1.0.0
    info-description: AI-powered Java migration assistant

  # Container image
  container-image:
    registry: ghcr.io
    group: cloudrishi
    name: anneal
    tag: ${quarkus.application.version:latest}

  # Logging
  log:
    level: INFO
    category:
      "com.rish.anneal":
        level: WARN

# Anneal configuration
anneal:
  llm:
    provider: ${LLM_PROVIDER:ollama}
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      fix-model: ${OLLAMA_FIX_MODEL:codellama:13b}
      prose-model: ${OLLAMA_PROSE_MODEL:llama3.1:8b}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: ${ANTHROPIC_MODEL:claude-sonnet-4-6}
    allow-cloud-fallback: ${ALLOW_CLOUD_FALLBACK:false}

  scanner:
    max-file-size-kb: ${MAX_FILE_SIZE_KB:500}
    allowed-base-paths: ${ALLOWED_BASE_PATHS:/tmp}

  embedding:
    model: all-MiniLM-L6-v2
    dimensions: 384

# Dev mode overrides
"%dev":
  quarkus:
    log:
      level: WARN
    hibernate-orm:
      log:
        sql: true
    datasource:
      devservices:
        enabled: false
      jdbc:
        url: jdbc:postgresql://localhost:5432/anneal
      username: admin
      password: admin

# Test overrides
"%test":
  quarkus:
    datasource:
      devservices:
        enabled: true
        image-name: pgvector/pgvector:pg16
