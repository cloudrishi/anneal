<svg width="680" height="320" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>anneal</title>
  <desc>anneal — AI-powered Java migration assistant</desc>

  <!-- background -->
  <rect width="680" height="320" fill="#0a0a0a"/>

  <!-- outer border frame -->
  <rect x="40" y="40" width="600" height="240" fill="none" stroke="#1e1e1e" stroke-width="1"/>

  <!-- left accent bar — molten orange -->
  <rect x="40" y="40" width="4" height="240" fill="#FF6B35"/>

  <!-- heat glow layers behind the icon -->
  <rect x="80" y="100" width="120" height="120" fill="#1a0800"/>
  <rect x="90" y="110" width="100" height="100" fill="#2a1000"/>
  <rect x="100" y="120" width="80" height="80" fill="#3d1800"/>

  <!-- Java braces — the before -->
  <text x="108" y="158" font-family="'IBM Plex Mono', monospace" font-size="36" font-weight="700" fill="#444444">{</text>
  <text x="144" y="158" font-family="'IBM Plex Mono', monospace" font-size="36" font-weight="700" fill="#333333">}</text>

  <!-- molten crack / heat line — transformation -->
  <polyline points="168,100 180,120 172,140 184,160 175,180 188,200 200,220"
            fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrow -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="220" y1="160" x2="258" y2="160" stroke="#FF6B35" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- clean structured rect — the after -->
  <rect x="265" y="120" width="80" height="80" fill="none" stroke="#FF6B35" stroke-width="1.5"/>
  <rect x="277" y="132" width="56" height="56" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="277" y1="160" x2="333" y2="160" stroke="#FF6B35" stroke-width="0.75"/>
  <line x1="305" y1="132" x2="305" y2="188" stroke="#FF6B35" stroke-width="0.75"/>

  <!-- wordmark -->
  <text x="380" y="148" font-family="'IBM Plex Mono', monospace" font-size="56" font-weight="700" fill="#e0e0e0" letter-spacing="-2">anneal</text>

  <!-- tagline -->
  <text x="381" y="178" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="400" fill="#555555" letter-spacing="1">java migration assistant</text>

  <!-- java 25 badge -->
  <rect x="381" y="194" width="62" height="18" fill="#FF6B35"/>
  <text x="412" y="207" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" fill="#0a0a0a" text-anchor="middle">java 25</text>

  <!-- bottom rule -->
  <line x1="44" y1="268" x2="636" y2="268" stroke="#1e1e1e" stroke-width="0.5"/>

  <!-- bottom phase line -->
  <text x="48" y="284" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#333333">detect</text>
  <text x="96" y="284" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1e1e1e">·</text>
  <text x="108" y="284" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#333333">plan</text>
  <text x="140" y="284" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1e1e1e">·</text>
  <text x="152" y="284" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#333333">fix</text>
  <text x="176" y="284" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1e1e1e">·</text>
  <text x="188" y="284" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#333333">validate</text>

  <text x="636" y="284" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#333333" text-anchor="end">8 → 25</text>
</svg>
